<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="canonical" href="https://proroctva.sk/audio.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Proroctva.sk">
<meta property="og:locale" content="sk_SK">
<meta property="og:title" content="Audio Biblia – dramatizované čítanie a žalmy | Proroctva.sk">
<meta property="og:description" content="Audio Biblia: dramatizované čítanie Písma a žalmy. Vlastný prehrávač s automatickým prehrávaním za sebou.">
<meta property="og:url" content="https://proroctva.sk/audio.html">
<meta property="og:image" content="https://proroctva.sk/og.png">
<meta name="twitter:card" content="summary">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Proroctva">
<link rel="stylesheet" href="theology.css">
<style>
  .player {
    position: sticky; top: 0; z-index: 5;
    background: var(--paper);
    border-bottom: 1px solid var(--rule);
    padding: 14px 2px 12px;
    margin-top: 8px;
  }
  .pl-cat { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-faint); }
  .pl-title { font-size: 17px; color: var(--ink-strong); margin: 3px 0 10px; line-height: 1.3; }
  .pl-controls { display: flex; align-items: center; gap: 20px; }
  .pl-btn {
    font-size: 15px; color: var(--ink); cursor: pointer; user-select: none;
    transition: color 0.12s; line-height: 1;
  }
  .pl-btn:hover { color: var(--ink-strong); }
  .pl-play { font-size: 22px; }
  .pl-time { font-size: 12px; color: var(--ink-faint); font-variant-numeric: tabular-nums; margin-left: auto; white-space: nowrap; }
  .pl-seek-wrap { margin-top: 10px; }
  input.pl-seek {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 3px; background: var(--rule); outline: none; cursor: pointer;
  }
  input.pl-seek::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 11px; height: 11px;
    border-radius: 50%; background: var(--ink-strong); cursor: pointer;
  }
  input.pl-seek::-moz-range-thumb {
    width: 11px; height: 11px; border: none; border-radius: 50%; background: var(--ink-strong); cursor: pointer;
  }

  .trk {
    display: grid;
    grid-template-columns: 26px 1fr 60px;
    gap: 12px; align-items: baseline;
    padding: 9px 4px; border-bottom: 1px solid var(--rule);
    cursor: pointer;
  }
  .trk:hover { background: var(--select-bg); }
  .trk-idx { font-size: 11px; color: var(--ink-faint); text-align: right; align-self: center; }
  .trk-title { font-size: 14.5px; color: var(--ink); }
  .trk:hover .trk-title { color: var(--ink-strong); }
  .trk.active .trk-title { color: var(--ink-strong); }
  .trk.active .trk-idx::before { content: "▶"; }
  .trk.active .trk-idx { color: var(--ink-strong); font-size: 10px; }
  .trk-dur { font-size: 12px; color: var(--ink-faint); text-align: right; white-space: nowrap; }

  .credit { margin-top: 8px; font-size: 12px; color: var(--ink-faint); }
  .credit a { color: var(--ink-faint); text-decoration: none; border-bottom: 1px solid var(--rule); }
  .credit a:hover { color: var(--ink-strong); border-bottom-color: var(--ink-strong); }

  @media (max-width: 620px) {
    .trk { grid-template-columns: 24px 1fr; }
    .trk-dur { display: none; }
  }
</style>
</head>
<body>

<header>
  <h1 id="t-title">audio biblia</h1>
  <div class="head-right">
    <nav class="lang">
      <span id="lang-en">EN</span><span class="sep"> · </span><span id="lang-sk">SK</span>
    </nav>
    <span class="count" id="count"></span>
  </div>
</header>
<nav class="site-nav" id="site-nav"></nav>
<p class="intro" id="t-intro"></p>

<div class="player">
  <div class="pl-cat" id="pl-cat"></div>
  <div class="pl-title" id="pl-title"></div>
  <div class="pl-controls">
    <span class="pl-btn" id="btn-prev" title="predošlá">⏮</span>
    <span class="pl-btn pl-play" id="btn-play" title="prehrať">▶</span>
    <span class="pl-btn" id="btn-next" title="ďalšia">⏭</span>
    <span class="pl-time" id="pl-time">0:00 / 0:00</span>
  </div>
  <div class="pl-seek-wrap">
    <input type="range" class="pl-seek" id="seek" min="0" max="1000" value="0" step="1">
  </div>
  <audio id="au" preload="metadata"></audio>
</div>

<main id="list"></main>

<footer id="t-footer"></footer>

<script src="audio-data.js"></script>
<script src="theology.js"></script>
<script>
const UI = {
  en: {
    title: "audio bible",
    intro: "The Bible to listen to — a dramatized reading of Holy Scripture, Old and New Testament, and the psalms, produced by TV Lux. Press play and it runs on by itself, episode after episode.",
    footer: "",
    credit: 'Audio: the “Biblia” show © <a href="https://www.tvlux.sk/" target="_blank" rel="noopener">TV Lux</a> · also on <a href="https://open.spotify.com/show/3tRUyVrzvaDbG8r2oT7PtZ" target="_blank" rel="noopener">Spotify</a>',
    count: n => n + " episodes",
    cats: { ot: "Old Testament — dramatized stories", nt: "New Testament — dramatized reading", ps: "The Psalms — read aloud" }
  },
  sk: {
    title: "audio biblia",
    intro: "Biblia na počúvanie — dramatizované čítanie Svätého písma, Starý aj Nový zákon, a žalmy v produkcii TV Lux. Stlač prehrať a hrá ďalej samo, epizóda za epizódou.",
    footer: "",
    credit: 'Audio: relácia „Biblia“ © <a href="https://www.tvlux.sk/" target="_blank" rel="noopener">TV Lux</a> · aj na <a href="https://open.spotify.com/show/3tRUyVrzvaDbG8r2oT7PtZ" target="_blank" rel="noopener">Spotify</a>',
    count: n => n + " epizód",
    cats: { ot: "Starý zákon — dramatizované príbehy", nt: "Nový zákon — dramatizované čítanie", ps: "Žalmy — nahovorené" }
  }
};

// flatten to a single ordered playlist
const FLAT = [];
for (const [cat, eps] of AUDIO_DATA)
  for (const [title, url, dur] of eps) FLAT.push({ cat, title, url, dur });

let lang = tGetLang();
let cur = 0, seeking = false;
const au = document.getElementById("au");
const seek = document.getElementById("seek");

try {
  const s = JSON.parse(localStorage.getItem("audio-pos") || "{}");
  if (Number.isInteger(s.idx) && s.idx >= 0 && s.idx < FLAT.length) cur = s.idx;
  var savedTime = s.time || 0;
} catch (e) { var savedTime = 0; }

function fmt(t) {
  if (!isFinite(t)) return "0:00";
  const m = Math.floor(t / 60), s = Math.floor(t % 60);
  return m + ":" + String(s).padStart(2, "0");
}
function savePos() {
  try { localStorage.setItem("audio-pos", JSON.stringify({ idx: cur, time: au.currentTime || 0 })); } catch (e) {}
}

function setCurrentUI() {
  const t = UI[lang];
  const item = FLAT[cur];
  document.getElementById("pl-cat").textContent = t.cats[item.cat];
  document.getElementById("pl-title").textContent = item.title;
  document.querySelectorAll(".trk.active").forEach(e => e.classList.remove("active"));
  const row = document.querySelector('.trk[data-i="' + cur + '"]');
  if (row) row.classList.add("active");
}

function load(i, autoplay) {
  cur = (i + FLAT.length) % FLAT.length;
  au.src = FLAT[cur].url;
  setCurrentUI();
  savePos();
  if (autoplay) au.play().catch(() => {});
}

document.getElementById("btn-play").addEventListener("click", () => {
  if (au.paused) au.play().catch(() => {}); else au.pause();
});
document.getElementById("btn-prev").addEventListener("click", () => load(cur - 1, true));
document.getElementById("btn-next").addEventListener("click", () => load(cur + 1, true));

au.addEventListener("play", () => { document.getElementById("btn-play").textContent = "❚❚"; });
au.addEventListener("pause", () => { document.getElementById("btn-play").textContent = "▶"; });
au.addEventListener("ended", () => { if (cur < FLAT.length - 1) load(cur + 1, true); });
au.addEventListener("loadedmetadata", () => {
  seek.max = Math.floor(au.duration) || 1000;
  if (savedTime && savedTime < au.duration) { au.currentTime = savedTime; savedTime = 0; }
  document.getElementById("pl-time").textContent = fmt(au.currentTime) + " / " + fmt(au.duration);
});
au.addEventListener("timeupdate", () => {
  if (!seeking) seek.value = Math.floor(au.currentTime);
  document.getElementById("pl-time").textContent = fmt(au.currentTime) + " / " + fmt(au.duration);
  if (Math.floor(au.currentTime) % 5 === 0) savePos();
});
seek.addEventListener("input", () => { seeking = true; document.getElementById("pl-time").textContent = fmt(seek.value) + " / " + fmt(au.duration); });
seek.addEventListener("change", () => { au.currentTime = seek.value; seeking = false; });

function render() {
  const t = UI[lang];
  tMarkLang(lang);
  document.getElementById("t-title").textContent = t.title;
  document.getElementById("t-intro").textContent = t.intro;
  document.getElementById("count").textContent = t.count(FLAT.length);
  document.getElementById("t-footer").innerHTML = `<div class="credit">${t.credit}</div>`;
  document.getElementById("site-nav").innerHTML = tNavHTML("audio.html", lang);

  const list = document.getElementById("list");
  list.innerHTML = "";
  let flatI = 0;
  for (const [cat, eps] of AUDIO_DATA) {
    const sec = document.createElement("section");
    const h = document.createElement("h2");
    h.textContent = t.cats[cat];
    sec.appendChild(h);
    let n = 0;
    for (const [title, url, dur] of eps) {
      const idx = flatI++;
      n += 1;
      const row = document.createElement("div");
      row.className = "trk" + (idx === cur ? " active" : "");
      row.dataset.i = idx;
      row.innerHTML =
        `<span class="trk-idx">${n}</span>` +
        `<span class="trk-title">${title}</span>` +
        `<span class="trk-dur">${dur}</span>`;
      row.addEventListener("click", () => load(idx, true));
      sec.appendChild(row);
    }
    list.appendChild(sec);
  }
  setCurrentUI();
}

tLangSwitcher(l => { lang = l; render(); });
render();
load(cur, false);   // ready the last-heard episode without autoplay
</script>

</body>
</html>
