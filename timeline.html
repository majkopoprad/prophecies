<style>
  .tl { border-left: 1px solid var(--rule); margin-left: 10px; margin-top: 8px; }
  .tl-item { position: relative; padding: 16px 4px 16px 26px; border-bottom: 1px solid var(--rule); }
  .tl-item::before {
    content: "";
    position: absolute;
    left: -5px; top: 22px;
    width: 7px; height: 7px;
    background: var(--paper);
    border: 1px solid var(--ink-faint);
    border-radius: 50%;
  }
  .tl-item.key::before { background: var(--ink-strong); border-color: var(--ink-strong); }
  .tl-date { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-faint); }
  .tl-title { font-size: 16px; color: var(--ink); margin-top: 2px; }
  .tl-item.key .tl-title { color: var(--ink-strong); }
  .tl-desc { font-size: 13.5px; color: var(--ink-faint); line-height: 1.65; margin-top: 4px; max-width: 620px; }
  .tl-ref { margin-top: 6px; font-size: 12px; }
  .tl-ref a { color: var(--ink-faint); text-decoration: none; border-bottom: 1px solid var(--rule); }
  .tl-ref a:hover { color: var(--ink-strong); border-bottom-color: var(--ink-strong); }
</style>

<body>

<header>
  <h1 id="t-title">dejiny spásy</h1>
  <div class="head-right">

    </nav>
    <span class="count" id="count"></span>
  </div>
</header>
<nav class="site-nav" id="site-nav"></nav>
<p class="intro" id="t-intro"></p>
<hr>

<div class="tl" id="tl"></div>

<footer id="t-footer"></footer>

<script src="theology.js"></script>
<script>
const UI = {
  en: {
    title: "history of salvation",
    intro: "The whole Bible on one line — from the first word of creation to the last promise of Revelation. The marked points are where God bound a covenant. Dates are traditional and approximate.",

    count: n => n + " milestones"
  },
  sk: {
    title: "dejiny spásy",
    intro: "Celá Biblia na jednej osi — od prvého slova stvorenia po posledné prisľúbenie Zjavenia. Zvýraznené body sú miesta, kde Boh uzavrel zmluvu. Dátumy sú tradičné a približné.",

    count: n => n + " míľnikov"
  }
};

// [dateSK, dateEN, titleSK, titleEN, descSK, descEN, book, chap, refLabelSK, refLabelEN, key]
const DATA = [
["na počiatku","in the beginning","Stvorenie","Creation",

 "Hriech vstupuje do sveta — a hneď zaznie prvé prisľúbenie Vykupiteľa (Gn 3,15).",
 "Sin enters the world — and at once the first promise of a Redeemer is spoken (Gen 3:15).",
 1,3,"Genezis 3","Genesis 3",true],
["dávnovek","primeval age","Potopa a Noach","The Flood and Noah",
 "Súd nad zlom a záchrana v korábe; Boh uzatvára zmluvu so všetkým živým.",

 "Israel enters Canaan; the promise made to Abraham is fulfilled.",
 6,1,"Jozua 1","Joshua 1",false],
["~1200–1050 pred Kr.","~1200–1050 BC","Sudcovia","The Judges",
 "Obdobie odpadu a záchrany — Boh vzbudzuje osloboditeľov, keď ľud volá.",
 "A cycle of falling away and rescue — God raises deliverers when the people cry out.",
 7,2,"Sudcovia 2","Judges 2",false],
["~1010 pred Kr.","~1010 BC","Kráľ Dávid","King David",
 "Pastier sa stáva kráľom; Boh mu prisľubuje večný trón — z jeho rodu príde Mesiáš.",
 "The shepherd becomes king; God promises him an everlasting throne — the Messiah will come from his line.",

["~960 pred Kr.","~960 BC","Šalamún a chrám","Solomon and the Temple",

["~30 po Kr.","~AD 30","Ukrižovanie a vzkriesenie","Crucifixion and Resurrection",
 "Zomiera za hriechy sveta a tretieho dňa vstáva z mŕtvych — srdce dejín spásy.",
 "He dies for the sins of the world and rises on the third day — the heart of salvation history.",
 42,24,"Lukáš 24","Luke 24",true],
["~30 po Kr.","~AD 30","Turíce a Cirkev","Pentecost and the Church",

["na konci vekov","at the end of the ages","Nové stvorenie","The New Creation",
 "Prísľub návratu Krista, nového neba a novej zeme: „Hľa, všetko robím nové.“",
 "The promise of Christ's return, a new heaven and a new earth: \"Behold, I make all things new.\"",
 66,21,"Zjavenie 21","Revelation 21",true]
];

let lang = tGetLang();

function render() {
  const t = UI[lang];
  tMarkLang(lang);
  document.getElementById("t-title").textContent = t.title;
  document.getElementById("t-intro").textContent = t.intro;
  document.getElementById("t-footer").textContent = t.footer;
  document.getElementById("count").textContent = t.count(DATA.length);
  document.getElementById("site-nav").innerHTML = tNavHTML("timeline.html", lang);

  document.getElementById("tl").innerHTML = DATA.map(row => {
    const [dsk, den, tsk, ten, csk, cen, book, chap, rsk, ren, key] = row;
    return `<div class="tl-item${key ? " key" : ""}">` +
      `<div class="tl-date">${lang === "sk" ? dsk : den}</div>` +
      `<div class="tl-title">${lang === "sk" ? tsk : ten}</div>` +
      `<div class="tl-desc">${lang === "sk" ? csk : cen}</div>` +
      `<div class="tl-ref"><a href="bible.html?b=${book}&c=${chap}">${lang === "sk" ? rsk : ren}</a></div>` +
      `</div>`;
  }).join("");
}

tLangSwitcher(l => { lang = l; render(); });
render();
</script>

</body>
