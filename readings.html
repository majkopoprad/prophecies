<meta name="mobile-web-app-capable" content="yes">

<style>
  .today-day { font-size: 20px; color: var(--ink-strong); margin-top: 10px; }
  .today-meta { margin-top: 12px; }
  .tm-row {
    display: grid;
    grid-template-columns: 150px 1fr;
    gap: 14px;
    padding: 8px 4px;
    border-bottom: 1px solid var(--rule);
    font-size: 14px;
  }
  .tm-label { color: var(--ink-faint); font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; }
  .tm-val { color: var(--ink); }
  .colour-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; vertical-align: middle; border: 1px solid var(--rule); }
  .open-readings {
    display: inline-block;
    margin-top: 20px;
    font-size: 15px;
    color: var(--ink);
    text-decoration: none;
    border-bottom: 1px solid var(--ink-faint);
    padding-bottom: 2px;
    transition: color 0.12s, border-color 0.12s;
  }
  .open-readings:hover { color: var(--ink-strong); border-bottom-color: var(--ink-strong); }
  .up-item {
    display: grid;
    grid-template-columns: 1fr 90px;
    gap: 14px;
    padding: 9px 4px;
    border-bottom: 1px solid var(--rule);
    text-decoration: none;
    align-items: baseline;
  }
  .up-item:hover { background: var(--select-bg); }
  .up-day { color: var(--ink); font-size: 14px; }
  .up-item:hover .up-day { color: var(--ink-strong); }
  .up-date { font-size: 12px; color: var(--ink-faint); text-align: right; }
  .reader-note { font-size: 12.5px; color: var(--ink-faint); margin-top: 12px; max-width: 640px; }
</style>
</head>
<body>

<header>
  <h1 id="t-title">dnešné čítania</h1>
  <div class="head-right">
    <nav class="lang">
      <span id="lang-en">EN</span><span class="sep"> · </span><span id="lang-sk">SK</span>
    </nav>
    <span class="count" id="count"></span>
  </div>
</header>
<nav class="site-nav" id="site-nav"></nav>
<hr>

<section>
  <div class="today-day" id="today-day"></div>
  <div class="today-meta" id="today-meta"></div>
  <a class="open-readings" id="open-readings" target="_blank" rel="noopener"></a>
  <p class="reader-note" id="today-note"></p>
</section>

<section>
  <h2 id="t-up"></h2>
  <div id="upcoming"></div>
</section>

<footer id="t-footer"></footer>

<script src="theology.js"></script>
<script>
const UI = {
  en: {
    title: "today's readings",
    season: "season", cycle: "Sunday cycle", weekday: "weekday cycle", colour: "colour",
    open: "Open today's readings at lc.kbs.sk →",
    up: "The coming days",
    note: "The liturgical season and cycle are computed here; the readings themselves — first reading, psalm and gospel — open on the official site of the Slovak Bishops' Conference (lc.kbs.sk), which is authoritative.",
    footer: "Sunday cycle and liturgical season computed from the date; readings from lc.kbs.sk.",
    count: ""
  },
  sk: {
    title: "dnešné čítania",
    season: "obdobie", cycle: "nedeľný cyklus", weekday: "cyklus všedného dňa", colour: "farba",
    open: "Otvoriť dnešné čítania na lc.kbs.sk →",
    up: "Nasledujúce dni",
    note: "Liturgické obdobie a cyklus vypočítava táto stránka; samotné čítania — prvé čítanie, žalm a evanjelium — sa otvoria na oficiálnej stránke Konferencie biskupov Slovenska (lc.kbs.sk), ktorá je smerodajná.",
    footer: "Nedeľný cyklus a liturgické obdobie vypočítané z dátumu; čítania z lc.kbs.sk.",
    count: ""
  }
};

const DAYS_SK = ["nedeľa","pondelok","utorok","streda","štvrtok","piatok","sobota"];
const DAYS_EN = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const MON_SK = ["januára","februára","marca","apríla","mája","júna","júla","augusta","septembra","októbra","novembra","decembra"];
const MON_EN = ["January","February","March","April","May","June","July","August","September","October","November","December"];

function easter(y) {
  const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,
    f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,
    i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451);
  return new Date(y, Math.floor((h+l-7*m+114)/31)-1, ((h+l-7*m+114)%31)+1);
}
function advent1(y) {
  const xmas = new Date(y, 11, 25);
  const back = xmas.getDay() === 0 ? 7 : xmas.getDay();
  return new Date(y, 11, 25 - back - 21);
}
function baptism(y) {
  // Sunday falling Jan 7–13 (after Epiphany, Jan 6)
  const jan6 = new Date(y, 0, 6);
  let add = (7 - jan6.getDay()) % 7;
  if (add === 0) add = 7;
  return new Date(y, 0, 6 + add);
}
const DAY = 86400000;
function addDays(d, n) { const x = new Date(d); x.setDate(x.getDate() + n); return x; }
function iso(d) {
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") +
         "-" + String(d.getDate()).padStart(2,"0");
}

// season: returns {key, sk, en, colour, colourHex}
function season(d) {
  const y = d.getFullYear();
  const t = d.getTime();
  const ash = addDays(easter(y), -46);
  const pent = addDays(easter(y), 49);
  const adv = advent1(y);
  const bap = baptism(y);
  const VIOLET = ["fialová","violet","#7a5a8f"];
  const WHITE  = ["biela","white","#c9a227"];
  const GREEN  = ["zelená","green","#4a7a4a"];
  if (t >= adv.getTime() && t <= new Date(y,11,24,23,59).getTime())
    return { key:"advent", sk:"Adventné obdobie", en:"Advent", c:VIOLET };
  if (t >= new Date(y,11,25).getTime() || t <= bap.getTime())
    return { key:"christmas", sk:"Vianočné obdobie", en:"Christmas", c:WHITE };
  if (t >= ash.getTime() && t < easter(y).getTime())
    return { key:"lent", sk:"Pôstne obdobie", en:"Lent", c:VIOLET };
  if (t >= easter(y).getTime() && t <= pent.getTime())
    return { key:"easter", sk:"Veľkonočné obdobie", en:"Easter", c:WHITE };
  return { key:"ordinary", sk:"Cezročné obdobie", en:"Ordinary Time", c:GREEN };
}

function litYear(d) {
  return d.getTime() >= advent1(d.getFullYear()).getTime()
    ? d.getFullYear() + 1 : d.getFullYear();
}
function sundayCycle(d) { return ["C","A","B"][litYear(d) % 3]; }
function weekdayCycle(d) { return litYear(d) % 2 === 0 ? "II" : "I"; }

let lang = tGetLang();

function fmtDay(d) {
  const dow = (lang === "sk" ? DAYS_SK : DAYS_EN)[d.getDay()];
  const mon = (lang === "sk" ? MON_SK : MON_EN)[d.getMonth()];
  return lang === "sk"
    ? `${dow}, ${d.getDate()}. ${mon} ${d.getFullYear()}`
    : `${dow}, ${d.getDate()} ${mon} ${d.getFullYear()}`;
}

function render() {
  const t = UI[lang];
  tMarkLang(lang);
  document.getElementById("t-title").textContent = t.title;
  document.getElementById("t-footer").textContent = t.footer;
  document.getElementById("t-up").textContent = t.up;
  document.getElementById("today-note").textContent = t.note;
  document.getElementById("site-nav").innerHTML = tNavHTML("readings.html", lang);

  const today = new Date();
  const s = season(today);
  document.getElementById("today-day").textContent = fmtDay(today);

  const rows = [
    [t.season, `<span class="colour-dot" style="background:${s.c[2]}"></span>${lang==="sk"?s.sk:s.en}`],
    [t.cycle, sundayCycle(today)],
    [t.weekday, weekdayCycle(today)],
    [t.colour, (lang==="sk"?s.c[0]:s.c[1])]
  ];
  document.getElementById("today-meta").innerHTML = rows.map(([l,v]) =>
    `<div class="tm-row"><span class="tm-label">${l}</span><span class="tm-val">${v}</span></div>`
  ).join("");

  const link = document.getElementById("open-readings");
  link.textContent = t.open;
  link.href = "https://lc.kbs.sk/?den=" + iso(today);

  let up = "";
  for (let i = 1; i <= 7; i++) {
    const d = addDays(today, i);
    up += `<a class="up-item" href="https://lc.kbs.sk/?den=${iso(d)}" target="_blank" rel="noopener">` +
      `<span class="up-day">${(lang==="sk"?DAYS_SK:DAYS_EN)[d.getDay()]}</span>` +
      `<span class="up-date">${d.getDate()}. ${d.getMonth()+1}.</span></a>`;
  }
  document.getElementById("upcoming").innerHTML = up;
}

tLangSwitcher(l => { lang = l; render(); });
render();
</script>

</body>
</html>
