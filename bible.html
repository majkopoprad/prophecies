<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Čítačka Biblie – SEB, katolícky, Roháček, KJV | Proroctva.sk</title>
<meta name="description" content="Online čítačka Biblie so štyrmi prekladmi vedľa seba – Slovenský ekumenický, katolícky (SSV), Roháčkov a King James. Kapitola po kapitole, s vyhľadávaním. Funguje offline.">
<link rel="canonical" href="https://proroctva.sk/bible.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Proroctva.sk">
<meta property="og:locale" content="sk_SK">
<meta property="og:title" content="Čítačka Biblie – štyri preklady vedľa seba | Proroctva.sk">
<meta property="og:description" content="Online čítačka Biblie: Slovenský ekumenický, katolícky (SSV), Roháčkov a King James. Kapitola po kapitole, s vyhľadávaním.">
<meta property="og:url" content="https://proroctva.sk/bible.html">
<meta property="og:image" content="https://proroctva.sk/og.png">
<meta name="twitter:card" content="summary">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Proroctva">
<link rel="stylesheet" href="theology.css">
</head>
<body>

<header>
  <h1 id="t-title">čítačka biblie</h1>
  <div class="head-right">
    <nav class="lang">
      <span id="lang-en">EN</span><span class="sep"> · </span><span id="lang-sk">SK</span>
    </nav>
    <span class="count" id="count"></span>
  </div>
</header>
<nav class="site-nav" id="site-nav"></nav>
<hr>

<div class="reader-bar">
  <select id="book-sel" class="reader-sel"></select>
  <select id="chap-sel" class="reader-sel"></select>
  <div class="trad-pills" id="trad-pills"></div>
</div>

<div class="search-wrap">
  <input id="search" type="text" autocomplete="off">
</div>

<div id="results" class="search-results"></div>

<div id="reader"></div>

<footer id="t-footer"></footer>

<script src="bible-books.js"></script>
<script src="theology.js"></script>
<script>
const UI = {
  en: {
    title: "bible reader",
    footer: "Translations: Slovak Ecumenical (SEB), Slovak Catholic (SSV), Roháček (1936) and the King James Version. Pick up to two to read in parallel. The reference links open the chapter on biblia.sk. Everything is cached for offline reading after the first visit.",
    search: "search the selected translation…",
    prev: "‹ previous", next: "next ›",
    ot: "Old Testament", nt: "New Testament",
    loading: "loading…",
    resultsCount: n => n + " results (showing first " + Math.min(n, 200) + ")",
    noResults: "nothing found."
  },
  sk: {
    title: "čítačka biblie",
    footer: "Preklady: Slovenský ekumenický (SEB), katolícky (SSV), Roháčkov (1936) a King James. Vyber si až dva a čítaj ich vedľa seba. Odkaz na kapitolu otvorí biblia.sk. Po prvej návšteve sa všetko uloží na čítanie offline.",
    search: "hľadaj vo vybranom preklade…",
    prev: "‹ predošlá", next: "ďalšia ›",
    ot: "Starý zákon", nt: "Nový zákon",
    loading: "načítavam…",
    resultsCount: n => n + " výsledkov (zobrazených prvých " + Math.min(n, 200) + ")",
    noResults: "nič sa nenašlo."
  }
};

let lang = tGetLang();
const DATA = {};           // code -> loaded translation array
let selected = ["seb"];    // up to two translation codes
let curBook = 1, curChap = 1;

try {
  const saved = JSON.parse(localStorage.getItem("bible-pos") || "{}");
  if (saved.book) curBook = saved.book;
  if (saved.chap) curChap = saved.chap;
  if (Array.isArray(saved.trans) && saved.trans.length) selected = saved.trans.slice(0, 2);
} catch (e) {}

// Deep link: bible.html?b=<book>&c=<chapter> (used by the reference lists).
const _params = new URLSearchParams(location.search);
if (_params.has("b")) {
  const b = parseInt(_params.get("b"), 10);
  if (b >= 1 && b <= 66) { curBook = b; curChap = parseInt(_params.get("c") || "1", 10) || 1; }
}

function save() {
  try {
    localStorage.setItem("bible-pos",
      JSON.stringify({ book: curBook, chap: curChap, trans: selected }));
  } catch (e) {}
}

function bookName(num) {
  const b = BIBLE_BOOKS[num - 1];
  return lang === "sk" ? b[1] : b[2];
}

async function loadTrans(code) {
  if (DATA[code]) return DATA[code];
  const res = await fetch("bible-" + code + ".json");
  DATA[code] = await res.json();
  return DATA[code];
}

function buildBookSelect() {
  const sel = document.getElementById("book-sel");
  const t = UI[lang];
  let html = `<optgroup label="${t.ot}">`;
  BIBLE_BOOKS.forEach(([num]) => {
    if (num === OT_COUNT + 1) html += `</optgroup><optgroup label="${t.nt}">`;
    html += `<option value="${num}"${num === curBook ? " selected" : ""}>${bookName(num)}</option>`;
  });
  html += "</optgroup>";
  sel.innerHTML = html;
}

function buildChapSelect() {
  const primary = DATA[selected[0]];
  const nCh = primary[curBook - 1].length;
  if (curChap > nCh) curChap = 1;
  const sel = document.getElementById("chap-sel");
  let html = "";
  for (let c = 1; c <= nCh; c++)
    html += `<option value="${c}"${c === curChap ? " selected" : ""}>${lang === "sk" ? "kap. " : "ch. "}${c}</option>`;
  sel.innerHTML = html;
}

function buildPills() {
  const box = document.getElementById("trad-pills");
  box.innerHTML = BIBLE_TRANS.map(([code, sk, badge]) =>
    `<span data-code="${code}" class="${selected.includes(code) ? "active" : ""}">${badge}</span>`
  ).join("");
  box.querySelectorAll("span").forEach(el => {
    el.addEventListener("click", () => toggleTrans(el.dataset.code));
  });
}

async function toggleTrans(code) {
  if (selected.includes(code)) {
    if (selected.length > 1) selected = selected.filter(c => c !== code);
  } else {
    selected.push(code);
    if (selected.length > 2) selected.shift();
  }
  await Promise.all(selected.map(loadTrans));
  save();
  buildPills();
  buildChapSelect();
  renderChapter();
}

function renderChapter() {
  const t = UI[lang];
  const b = BIBLE_BOOKS[curBook - 1];
  const cols = selected.map(c => DATA[c][curBook - 1][curChap - 1] || []);
  const maxV = Math.max(...cols.map(c => c.length));

  const link = "https://biblia.sk/citanie/seb/" + b[3] + "/" + curChap;
  let html = `<div class="chap-head">` +
    `<span class="chap-title">${bookName(curBook)} ${curChap}</span>` +
    `<span class="chap-src"><a href="${link}" target="_blank" rel="noopener">biblia.sk</a></span></div>`;

  const parallel = selected.length > 1;
  for (let i = 0; i < maxV; i++) {
    html += `<div class="verse${parallel ? " parallel" : ""}">` +
      `<span class="v-num">${i + 1}</span>` +
      cols.map(col => {
        const txt = col[i] || "";
        return `<span class="v-text${txt ? "" : " miss"}">${txt || "—"}</span>`;
      }).join("");
    html += "</div>";
  }

  html += `<div class="reader-foot">` +
    `<span class="cal-btn" id="rd-prev">${t.prev}</span>` +
    `<span class="cal-btn" id="rd-next">${t.next}</span></div>`;

  document.getElementById("reader").innerHTML = html;
  document.getElementById("rd-prev").addEventListener("click", () => step(-1));
  document.getElementById("rd-next").addEventListener("click", () => step(1));
  document.getElementById("count").textContent =
    BIBLE_TRANS.filter(x => selected.includes(x[0])).map(x => x[2]).join(" · ");
  save();
}

function step(dir) {
  const primary = DATA[selected[0]];
  const nCh = primary[curBook - 1].length;
  curChap += dir;
  if (curChap < 1) {
    if (curBook > 1) { curBook -= 1; curChap = primary[curBook - 1].length; }
    else curChap = 1;
  } else if (curChap > nCh) {
    if (curBook < 66) { curBook += 1; curChap = 1; }
    else curChap = nCh;
  }
  document.getElementById("book-sel").value = curBook;
  buildChapSelect();
  renderChapter();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// ---- search ----
let searchTimer = null;
function runSearch(q) {
  const t = UI[lang];
  const results = document.getElementById("results");
  q = q.trim().toLowerCase();
  if (q.length < 3) { results.innerHTML = ""; document.getElementById("reader").style.display = ""; return; }
  const arr = DATA[selected[0]];
  const hits = [];
  for (let bi = 0; bi < 66 && hits.length < 200; bi++) {
    const book = arr[bi];
    for (let ci = 0; ci < book.length; ci++) {
      const chap = book[ci];
      for (let vi = 0; vi < chap.length; vi++) {
        const txt = chap[vi];
        if (txt && txt.toLowerCase().includes(q)) {
          hits.push([bi + 1, ci + 1, vi + 1, txt]);
          if (hits.length >= 200) break;
        }
      }
      if (hits.length >= 200) break;
    }
  }
  document.getElementById("reader").style.display = "none";
  if (!hits.length) { results.innerHTML = `<div class="reader-note">${t.noResults}</div>`; return; }
  const re = new RegExp("(" + q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "ig");
  results.innerHTML = `<div class="reader-note">${t.resultsCount(hits.length)}</div>` +
    hits.map(([bn, cn, vn, txt]) => {
      const snip = txt.replace(re, "<b>$1</b>");
      return `<div class="sr-item" data-b="${bn}" data-c="${cn}">` +
        `<span class="sr-ref">${bookName(bn)} ${cn}:${vn}</span>` +
        `<span class="sr-text">${snip}</span></div>`;
    }).join("");
  results.querySelectorAll(".sr-item").forEach(el => {
    el.addEventListener("click", () => {
      curBook = +el.dataset.b; curChap = +el.dataset.c;
      document.getElementById("search").value = "";
      results.innerHTML = "";
      document.getElementById("reader").style.display = "";
      document.getElementById("book-sel").value = curBook;
      buildChapSelect();
      renderChapter();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  });
}

function renderChrome() {
  const t = UI[lang];
  tMarkLang(lang);
  document.getElementById("t-title").textContent = t.title;
  document.getElementById("t-footer").textContent = t.footer;
  document.getElementById("search").placeholder = t.search;
  document.getElementById("site-nav").innerHTML = tNavHTML("bible.html", lang);
  buildBookSelect();
  buildPills();
}

document.getElementById("book-sel").addEventListener("change", (e) => {
  curBook = +e.target.value; curChap = 1;
  buildChapSelect(); renderChapter();
});
document.getElementById("chap-sel").addEventListener("change", (e) => {
  curChap = +e.target.value; renderChapter();
});
document.getElementById("search").addEventListener("input", (e) => {
  clearTimeout(searchTimer);
  const v = e.target.value;
  searchTimer = setTimeout(() => runSearch(v), 200);
});

tLangSwitcher(l => {
  lang = l;
  renderChrome();
  buildChapSelect();
  renderChapter();
});

(async () => {
  renderChrome();
  document.getElementById("reader").innerHTML =
    `<div class="reader-note">${UI[lang].loading}</div>`;
  await Promise.all(selected.map(loadTrans));
  buildChapSelect();
  renderChapter();
})();
</script>

</body>
</html>
