let lang = tGetLang();
const list = document.getElementById("list");

function addRows(sec, items, isParable, startN) {
  let n = startN;
  for (const item of items) {
    n += 1;
    const row = document.createElement("div");
    row.className = "row";
    const refs = item[4];
    row.dataset.refs = refs;
    const firstRef = refs.split(";")[0].trim();
    const refShown = lang === "sk" ? tRefSK(firstRef) : firstRef;
    const name = lang === "sk" ? item[1] : item[0];
    const detail = lang === "sk" ? item[3] : item[2];
    row.innerHTML =
      `<span class="num">${n}</span>` +
      `<span class="p">${refShown}</span>` +
      `<span class="what">${name}</span>` +
      `<span class="f">${detail}</span>`;
    row.addEventListener("click", () => toggle(row));
    sec.appendChild(row);
  }
  return n;
}

function render() {
  const t = UI[lang];
  tMarkLang(lang);
  document.getElementById("t-title").textContent = t.title;
  document.getElementById("t-intro").textContent = t.intro;
  document.getElementById("t-footer").textContent = t.footer;
  document.getElementById("site-nav").innerHTML = tNavHTML("parables.html", lang);

  list.innerHTML = "";
  let sec = document.createElement("section");
  let h = document.createElement("h2");
  h.textContent = lang === "sk" ? "Podobenstvá" : "Parables";
  sec.appendChild(h);
  let n = addRows(sec, PARABLES, true, 0);
  list.appendChild(sec);

  sec = document.createElement("section");
  h = document.createElement("h2");
  h.textContent = lang === "sk" ? "Zázraky" : "Miracles";
  sec.appendChild(h);
  addRows(sec, MIRACLES, false, 0);
  list.appendChild(sec);

  document.getElementById("count").textContent = t.count(PARABLES.length, MIRACLES.length);
}

function toggle(row) {
  const next = row.nextElementSibling;
  if (next && next.classList.contains("verses")) { next.remove(); return; }
  const refs = row.dataset.refs.split(";").map(s => s.trim()).filter(Boolean);
  const panel = document.createElement("div");
  panel.className = "verses" + (refs.length === 1 ? " single" : "");
  panel.innerHTML = refs.map(r => `<div>${tQuote(r, "", lang)}</div>`).join("");
  row.after(panel);
}

tLangSwitcher(l => { lang = l; render(); });
render();
