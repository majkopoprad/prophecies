let lang = tGetLang();
const list = document.getElementById("list");

function render() {
  const t = UI[lang];
  tMarkLang(lang);
  document.getElementById("t-title").textContent = t.title;
  document.getElementById("t-intro").textContent = t.intro;
  document.getElementById("t-footer").textContent = t.footer;
  document.getElementById("site-nav").innerHTML = tNavHTML("reference.html", lang);

  list.innerHTML = "";
  for (const [sk, en, ref, refLabel, items] of DATA) {
    const sec = document.createElement("section");
    const h = document.createElement("h2");
    h.textContent = lang === "sk" ? sk : en;
    sec.appendChild(h);
    if (ref && refLabel) {
      const r = document.createElement("div");
      r.className = "ref-ref";
      r.innerHTML = `<a href="${ref}">${refLabel}</a>`;
      sec.appendChild(r);
    }
    items.forEach(([isk, ien], i) => {
      const row = document.createElement("div");
      row.className = "ref-item";
      row.innerHTML = `<span class="ref-num">${i + 1}</span>` +
        `<span class="ref-text">${lang === "sk" ? isk : ien}</span>`;
      sec.appendChild(row);
    });
    list.appendChild(sec);
  }
  document.getElementById("count").textContent = t.count(DATA.length);
}

tLangSwitcher(l => { lang = l; render(); });
render();
</script>
