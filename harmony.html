let lang = tGetLang();
const list = document.getElementById("list");

function shortRef(ref) {
  // "Matthew 21:1–11" -> "21:1–11" for the column display
  return ref ? ref.replace(/^[1-2]?\s?[A-Za-z]+\s/, "") : "·";
}

function render() {
  const t = UI[lang];
  tMarkLang(lang);
  document.getElementById("t-title").textContent = t.title;
  document.getElementById("t-intro").textContent = t.intro;
  document.getElementById("t-footer").textContent = t.footer;
  document.getElementById("site-nav").innerHTML = tNavHTML("harmony.html", lang);

  const gospels = lang === "sk" ? ["MT", "MK", "LK", "JN"] : ["MT", "MK", "LK", "JN"];
  list.innerHTML = "";
  let n = 0, total = 0;
  for (const [section, items] of DATA) {
    const sec = document.createElement("section");
    const h = document.createElement("h2");
    h.textContent = lang === "sk" ? (SECTIONS_SK[section] || section) : section;
    sec.appendChild(h);

    const head = document.createElement("div");
    head.className = "h-row h-head";
    head.innerHTML = `<span></span><span></span>` +
      gospels.map(g => `<span>${g}</span>`).join("");
    sec.appendChild(head);

    for (const [en, sk, mt, mk, lk, jn] of items) {
      n += 1; total += 1;
      const row = document.createElement("div");
      row.className = "h-row";
      row.dataset.refs = [mt, mk, lk, jn].filter(Boolean).join("|");
      row.innerHTML =
        `<span class="num">${n}</span>` +
        `<span class="what">${lang === "sk" ? sk : en}</span>` +
        [mt, mk, lk, jn].map(r => `<span class="h-ref">${shortRef(r)}</span>`).join("");
      row.addEventListener("click", () => toggle(row));
      sec.appendChild(row);
    }
    list.appendChild(sec);
  }
  document.getElementById("count").textContent = t.count(total);
}

function toggle(row) {
  const next = row.nextElementSibling;
  if (next && next.classList.contains("verses")) { next.remove(); return; }
  const refs = row.dataset.refs.split("|").filter(Boolean);
  const panel = document.createElement("div");
  panel.className = "verses" + (refs.length === 1 ? " single" : "");
  panel.innerHTML = refs.map(r => `<div>${tQuote(r, "", lang)}</div>`).join("");
  row.after(panel);
}

tLangSwitcher(l => { lang = l; render(); });
